name: Pack removal / deprecation
description: Request takedown or deprecation of a pack you authored.
title: "[removal] <pack-id>"
labels: ["pack-removal"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to request removal or deprecation of a pack you authored.
        Removal is honoured on a best-effort basis and does not retroactively
        invalidate users' local 24h caches.
  - type: input
    id: pack_id
    attributes:
      label: Pack ID to remove
      placeholder: icp-traitprint-cloud
    validations:
      required: true
  - type: dropdown
    id: action
    attributes:
      label: Requested action
      options:
        - Remove (delete entry)
        - Deprecate (keep entry, add deprecation note)
      default: 0
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Brief context. "No longer maintained" / "superseded by <id>" / "source repo private or deleted" / etc.
    validations:
      required: true
  - type: input
    id: author_github
    attributes:
      label: Your GitHub handle
      description: Must match `author.github` on the existing registry entry, or you must otherwise prove ownership.
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I am the author (or am authorised by the author) of the pack named above.
          required: true
