name: Pack submission
description: Propose a new pack for the synthpanel registry.
title: "[submission] <pack-id>"
labels: ["pack-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a pack. Open this issue **before** you open a PR —
        it confirms author consent and lets reviewers flag obvious problems
        early. See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for the
        full submission flow and review bar.

        In v1, packs live **in this repo** under
        `packs/<pack-id>/synthpanel-pack.yaml`. You do not need to host a
        separate repo.
  - type: input
    id: pack_id
    attributes:
      label: Pack ID
      description: Unique slug, lowercase, hyphen-separated. Must be unique across `packs/`. The pack directory and the pack YAML's `id:` field must both use this value.
      placeholder: icp-traitprint-cloud
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Pack kind
      options:
        - persona
        - instrument
      default: 0
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: Human-readable name
      description: Optional. If omitted, the pack `id` is used as the display name.
      placeholder: Traitprint Cloud ICPs
  - type: textarea
    id: description
    attributes:
      label: Description
      description: One or two sentences. Will appear in `synthpanel pack search` output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pack version
      description: Mirrors the pack's top-level `version:` field. Start at "1" unless you have a reason to pin a semver.
      placeholder: "1"
    validations:
      required: true
  - type: input
    id: author_github
    attributes:
      label: Author GitHub handle
      description: Public GitHub handle of the pack author. This confirms consent.
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags (optional)
      description: Comma-separated. Reserved for future `pack search` surfacing.
      placeholder: b2b, saas
  - type: checkboxes
    id: self_review
    attributes:
      label: Author self-review
      description: The reviewer will re-check these before merge.
      options:
        - label: Pack YAML lives at `packs/<pack-id>/synthpanel-pack.yaml` and the directory name matches the pack `id:` field.
          required: true
        - label: Running `python scripts/build_registry.py` locally validates the pack and regenerates `default.json` cleanly.
          required: true
        - label: Pack ID is unique and not already present under `packs/`.
          required: true
        - label: Author GitHub handle is public.
          required: true
        - label: No obvious prompt-injection payloads in persona text.
          required: true
